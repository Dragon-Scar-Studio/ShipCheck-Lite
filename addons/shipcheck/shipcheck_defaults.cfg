; ShipCheck Lite recommended config.
; Copy this file to res://shipcheck_config.cfg or click Open Config in the dock.
; Severity values: INFO, WARNING, ERROR, CRITICAL.

[general]
; include_addons: Off by default so scans do not report third-party addon internals.
include_addons=false
; show_suppressed_issues: Reserved for debug workflows that want to inspect ignored findings.
show_suppressed_issues=false

[scanners]
missing_script=true
broken_resource=true
case_sensitive_path=true
project_settings=true
input_map=true
debug_code=true
export_preset=true
large_asset=true
release_risk=true

[broken_resource]
; scan_pure_comments: Off by default to avoid false positives from docs, BBCode, and Markdown examples.
scan_pure_comments=false

[debug_code]
print_enabled=true
print_severity="INFO"
prints_enabled=true
prints_severity="INFO"
printerr_enabled=true
printerr_severity="WARNING"
push_warning_enabled=true
push_warning_severity="INFO"
push_error_enabled=true
push_error_severity="WARNING"
assert_enabled=true
assert_severity="INFO"
breakpoint_enabled=true
breakpoint_severity="ERROR"
todo_enabled=true
todo_severity="INFO"
fixme_enabled=true
fixme_severity="INFO"

[large_assets]
enabled=true
default_threshold_mb=25
severity="WARNING"
source_file_severity="INFO"
extra_extensions=[]
png_mb=8
jpg_mb=8
jpeg_mb=8
webp_mb=8
wav_mb=12
ogg_mb=20
mp3_mb=20
mp4_mb=50
webm_mb=50
tres_mb=10
res_mb=10
psd_mb=1
kra_mb=1
aseprite_mb=1
blend_mb=1

[input_map]
report_undefined_actions=true
report_unused_actions=true
ignore_ui_actions=true

[project_settings]
require_main_scene=true
no_main_scene_severity="WARNING"
main_scene_missing_severity="CRITICAL"
check_project_icon=true
project_icon_missing_severity="WARNING"
check_autoloads=true
autoload_missing_severity="CRITICAL"
project_name_missing_severity="INFO"

[export_presets]
require_export_presets=true
require_export_paths=true

[release_risk]
report_vcs_ignore=true
missing_gitignore_severity="WARNING"
missing_gitignore_rule_severity="INFO"
report_export_credentials_file=true
export_credentials_severity="WARNING"
report_sensitive_files=true
sensitive_file_severity="CRITICAL"
report_secret_literals=true
secret_literal_severity="WARNING"
private_key_literal_severity="CRITICAL"
report_plain_http_urls=true
plain_http_url_severity="WARNING"
report_gdignore_issues=true
gdignore_reference_severity="ERROR"
gdignore_content_severity="INFO"
